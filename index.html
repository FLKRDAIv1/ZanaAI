  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Immediately sets theme from localStorage to prevent FOUC (Flash of Unstyled Content)
    (function() {
      const theme = localStorage.getItem('zana_theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();

    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Vazirmatn', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
          },
          colors: {
            // Refined Color Palette
            // Light Theme
            'base': '#FFFFFF',          // Full White background
            'surface': '#FFFFFF',       // Pure white for cards
            'overlay': '#F4F4F5',       // Zinc-100
            'primary': '#000000',       // Pure Black text
            'subtle': '#52525B',        // Zinc-600
            'muted': '#A1A1AA',         // Zinc-400
            'highlight': '#2563EB',     // Blue-600 (Professional Blue)
            
            // Dark Theme
            'dark-base': '#000000',     // Pure Black background
            'dark-surface': '#18181B',  // Zinc-900
            'dark-overlay': '#27272A',  // Zinc-800
            'dark-primary': '#FFFFFF',  // Pure White text
            'dark-subtle': '#A1A1AA',   // Zinc-400
            'dark-muted': '#52525B',    // Zinc-600
            'dark-highlight': '#3B82F6',// Blue-500
          },
          animation: {
            'fast-spin': 'spin 0.5s linear infinite',
            'fade-in': 'fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1)',
            'scale-in': 'scaleIn 0.3s cubic-bezier(0.4, 0, 0.2, 1)',
            'slide-up': 'slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
            'subtle-pulse': 'subtlePulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'border-rotate': 'borderRotate 4s linear infinite',
            'pulse-glow': 'pulseGlow 4s ease-in-out infinite',
            'text-shimmer': 'shimmer 2.5s linear infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            scaleIn: {
              '0%': { transform: 'scale(0.95)', opacity: '0' },
              '100%': { transform: 'scale(1)', opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(10px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            subtlePulse: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.7' },
            },
            borderRotate: {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' },
            },
            pulseGlow: {
              '0%, 100%': { boxShadow: 'inset 0 0 40px -10px rgba(139, 92, 246, 0.2)' }, 
              '25%': { boxShadow: 'inset 0 0 50px -10px rgba(236, 72, 153, 0.2)' },
              '50%': { boxShadow: 'inset 0 0 40px -10px rgba(34, 197, 94, 0.2)' },
              '75%': { boxShadow: 'inset 0 0 50px -10px rgba(6, 182, 212, 0.2)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '200% center' },
              '100%': { backgroundPosition: '-200% center' },
            }
          },
          boxShadow: {
            'glass': '0 4px 30px rgba(0, 0, 0, 0.1)',
            'glass-dark': '0 4px 30px rgba(0, 0, 0, 0.3)',
            'neon-glow': '0 0 20px rgba(139, 92, 246, 0.5)',
          }
        }
      }
    }
  </script>

  <style>
      /* Smooth scrolling */
      html {
          scroll-behavior: smooth;
      }
      
      /* Premium Button Glow */
      @keyframes premium-glow-border-spin {
        0% { --glow-angle: 0deg; }
        100% { --glow-angle: 360deg; }
      }
      .btn-premium-glow {
        --glow-speed: 4s;
        --glow-blur: 8px;
        --glow-color-1: hsl(180, 100%, 50%);
        --glow-color-2: hsl(240, 100%, 65%);
        --glow-color-3: hsl(300, 100%, 65%);
        --glow-color-4: hsl(0, 100%, 65%);

        position: relative;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        overflow: hidden;
      }
      .btn-premium-glow:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      }
      
      /* Markdown Enhancements */
      .prose pre {
        background-color: #27272A !important;
        border-radius: 0.5rem;
      }
      .dark .prose pre {
         background-color: #09090B !important;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #A1A1AA;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #71717A;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #52525B;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #71717A;
      }
  </style>
